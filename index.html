<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Pro · Secure Encryption</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #000000;
    --surface: rgba(255, 255, 255, 0.03);
    --surface-bright: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.08);
    --border-bright: rgba(255, 255, 255, 0.15);
    
    --primary: #8b5cf6;
    --primary-bright: #a78bfa;
    --primary-glow: rgba(139, 92, 246, 0.6);
    
    --secondary: #3b82f6;
    --accent: #ec4899;
    --success: #10b981;
    --danger: #ef4444;
    
    --text: #ffffff;
    --text-dim: #a3a3a3;
    --text-muted: #737373;
  }

  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Radial gradient background */
  .bg-radial {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.15), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.1), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.08), transparent 60%);
    animation: gradientPulse 15s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes gradientPulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Noise texture */
  .noise {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
  }

  /* Animated orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.2;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  .orb-1 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--primary), transparent);
    top: -10%;
    right: -5%;
    animation: orb1 20s ease-in-out infinite;
  }

  .orb-2 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--secondary), transparent);
    bottom: -5%;
    left: -10%;
    animation: orb2 18s ease-in-out infinite;
  }

  @keyframes orb1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-100px, 100px); }
  }

  @keyframes orb2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(100px, -80px); }
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 640px;
    animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    position: relative;
    box-shadow: 
      0 20px 60px var(--primary-glow),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
  }

  .icon::before {
    content: '';
    position: absolute;
    inset: -3px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 24px;
    z-index: -1;
    filter: blur(12px);
    opacity: 0.5;
    animation: iconGlow 3s ease-in-out infinite;
  }

  @keyframes iconGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.8; }
  }

  .title {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #ffffff 0%, var(--primary-bright) 40%, var(--secondary) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 400;
    margin-top: 12px;
  }

  /* Main card */
  .card {
    background: linear-gradient(135deg, rgba(20, 20, 20, 0.6), rgba(10, 10, 10, 0.4));
    backdrop-filter: blur(50px) saturate(150%);
    border: 1.5px solid var(--border);
    border-radius: 36px;
    padding: 48px;
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 40px 100px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(600px circle at var(--x, 50%) var(--y, 50%), 
      rgba(139, 92, 246, 0.08), transparent 40%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .card:hover::before {
    opacity: 1;
  }

  .card:hover {
    border-color: var(--border-bright);
    transform: translateY(-4px);
    box-shadow: 
      0 50px 120px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(255, 255, 255, 0.06) inset;
  }

  /* Sections */
  .section {
    margin-bottom: 36px;
  }

  .label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    text-transform: none;
    letter-spacing: 0.02em;
    transition: all 0.2s;
  }

  /* Input container */
  .input-box {
    position: relative;
  }

  .input-group {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .input-group::after {
    content: '';
    position: absolute;
    inset: -1.5px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }

  .input-group:focus-within {
    background: var(--surface-bright);
    border-color: transparent;
    box-shadow: 
      0 0 0 4px rgba(139, 92, 246, 0.12),
      0 12px 32px rgba(139, 92, 246, 0.25);
    transform: translateY(-2px);
  }

  .input-group:focus-within::after {
    opacity: 1;
  }

  .input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Fira Code', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    padding: 14px 18px;
    letter-spacing: 0.02em;
  }

  .input::placeholder {
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Buttons */
  .btns {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn {
    background: var(--surface-bright);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover:not(:disabled)::before {
    opacity: 1;
  }

  .btn:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--border-bright);
    color: var(--text);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
  }

  .btn:active:not(:disabled) {
    transform: scale(0.96);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-accent {
    background: linear-gradient(135deg, var(--primary), var(--primary-bright));
    border: none;
    color: #fff;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    font-weight: 800;
  }

  .btn-accent:hover:not(:disabled) {
    box-shadow: 0 12px 32px rgba(139, 92, 246, 0.5);
    transform: translateY(-3px) scale(1.02);
  }

  /* Strength meter */
  .meter {
    height: 8px;
    background: var(--surface);
    border-radius: 10px;
    margin-top: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) inset;
    position: relative;
  }

  .meter-fill {
    height: 100%;
    border-radius: 10px;
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    width: 0%;
    position: relative;
    box-shadow: 0 0 24px currentColor;
  }

  .meter-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
    animation: shimmer 2.5s linear infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Checkbox */
  .check-box {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    transition: all 0.2s;
    cursor: pointer;
    user-select: none;
  }

  .check-box:hover {
    background: var(--surface-bright);
    border-color: var(--border-bright);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  .check-label {
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 40px 0;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-bottom: 32px;
  }

  .tab {
    padding: 16px 28px;
    background: transparent;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
  }

  .tab::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }

  .tab:hover:not(.active) {
    background: var(--surface-bright);
    color: var(--text);
    transform: scale(1.03);
  }

  .tab.active {
    color: #fff;
    box-shadow: 
      0 10px 30px var(--primary-glow),
      0 0 0 1px rgba(255, 255, 255, 0.15) inset;
    transform: scale(1.02);
  }

  .tab.active::before {
    opacity: 1;
  }

  /* Textarea */
  .text-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .text-box::after {
    content: '';
    position: absolute;
    inset: -1.5px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }

  .text-box:focus-within {
    background: var(--surface-bright);
    border-color: transparent;
    box-shadow: 
      0 0 0 4px rgba(139, 92, 246, 0.12),
      0 12px 32px rgba(139, 92, 246, 0.25);
  }

  .text-box:focus-within::after {
    opacity: 1;
  }

  .textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
    min-height: 150px;
  }

  .textarea::placeholder {
    color: var(--text-muted);
  }

  .count {
    font-size: 13px;
    font-family: 'Fira Code', monospace;
    color: var(--text-muted);
    text-align: right;
    margin-top: 12px;
  }

  /* File upload */
  .upload {
    background: var(--surface);
    border: 2.5px dashed var(--border);
    border-radius: 24px;
    padding: 72px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    margin-bottom: 20px;
    position: relative;
  }

  .upload::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.1), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload:hover {
    background: var(--surface-bright);
    border-color: var(--primary);
    transform: scale(1.02);
  }

  .upload:hover::before {
    opacity: 1;
  }

  .upload.drag-over {
    background: rgba(139, 92, 246, 0.12);
    border-color: var(--primary);
    transform: scale(1.05);
  }

  .upload.has-file {
    background: rgba(16, 185, 129, 0.08);
    border-color: var(--success);
    border-style: solid;
  }

  .upload-emoji {
    font-size: 64px;
    margin-bottom: 24px;
    animation: bounce 3s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }

  .upload-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
  }

  .upload-hint {
    font-size: 15px;
    color: var(--text-dim);
  }

  /* File preview */
  .preview {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-bottom: 20px;
    animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-icon {
    width: 68px;
    height: 68px;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.15));
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: 14px;
    font-family: 'Fira Code', monospace;
    color: var(--text-dim);
  }

  .btn-remove {
    background: var(--surface-bright);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-remove:hover {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
    transform: scale(1.08);
  }

  /* Actions */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }

  .btn-main {
    grid-column: 1 / -1;
    padding: 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 900;
    color: #fff;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    box-shadow: 
      0 16px 48px var(--primary-glow),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.02em;
  }

  .btn-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.25), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .btn-main:hover:not(:disabled)::before {
    transform: translateX(100%);
  }

  .btn-main:hover:not(:disabled) {
    box-shadow: 
      0 24px 60px var(--primary-glow),
      0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    transform: translateY(-4px) scale(1.02);
  }

  .btn-main:active:not(:disabled) {
    transform: scale(0.98);
  }

  .btn-main:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-sec {
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .btn-sec:hover {
    background: var(--surface-bright);
    border-color: var(--border-bright);
    color: var(--text);
    transform: translateY(-2px);
  }

  /* Output */
  .output {
    display: none;
  }

  .output.show {
    display: block;
    animation: appear 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes appear {
    from {
      opacity: 0;
      transform: translateY(32px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .output-label {
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .output-label.success {
    color: var(--success);
  }

  .output-label.error {
    color: var(--danger);
  }

  .indicator {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 16px currentColor;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .output-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    position: relative;
    transition: all 0.3s;
  }

  .output-box.success {
    border-color: var(--success);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
  }

  .output-box.error {
    border-color: var(--danger);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
  }

  .output-text {
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    word-break: break-all;
    padding-right: 140px;
    min-height: 70px;
  }

  .output-text.plain {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    word-break: normal;
    line-height: 1.9;
  }

  .output-text.error {
    color: var(--danger);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    word-break: normal;
  }

  .output-actions {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
  }

  .out-btn {
    background: var(--surface-bright);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .out-btn:hover {
    background: var(--surface);
    border-color: var(--border-bright);
    color: var(--text);
    transform: scale(1.08);
  }

  .out-btn.copied {
    background: rgba(16, 185, 129, 0.2);
    border-color: var(--success);
    color: var(--success);
  }

  .info {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 14px;
    margin-top: 16px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: rgba(20, 20, 20, 0.98);
    backdrop-filter: blur(40px);
    border: 1.5px solid var(--border-bright);
    color: var(--text);
    padding: 18px 32px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 
      0 24px 72px rgba(0, 0, 0, 0.9),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    z-index: 1000;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden {
    display: none !important;
  }

  /* Mobile */
  @media (max-width: 640px) {
    body { padding: 20px; }
    .card { padding: 32px; }
    .title { font-size: 40px; }
    .icon { width: 64px; height: 64px; font-size: 32px; }
  }
</style>
</head>
<body>

<div class="bg-radial"></div>
<div class="noise"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <div class="header">
    <div class="brand">
      <div class="icon">🔐</div>
      <h1 class="title">Cipher Pro</h1>
    </div>
    <p class="subtitle">Military-grade AES-256 encryption for messages & files</p>
  </div>

  <div class="card" id="card">
    <!-- Secret Key -->
    <div class="section">
      <div class="label">
        <span>Secret Key</span>
        <span class="status-badge" id="strengthBadge"></span>
      </div>
      <div class="input-box">
        <div class="input-group">
          <input type="password" id="secretKey" class="input" placeholder="Enter or generate a shared key…" oninput="updateStrength()">
          <div class="btns">
            <button class="btn" onclick="toggleVis()">👁</button>
            <button class="btn" onclick="copyKey()">Copy</button>
            <button class="btn btn-accent" onclick="generateKey()">Generate</button>
          </div>
        </div>
      </div>
      <div class="meter">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      
      <div class="check-box" onclick="toggleCheck()">
        <input type="checkbox" id="rememberKey" class="checkbox" onchange="handleRememberKey()">
        <span class="check-label">Remember key this session ⚠️ clears on browser close</span>
      </div>
    </div>

    <div class="divider">Mode</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchMode('text')" id="textTab">
        💬 Text
      </button>
      <button class="tab" onclick="switchMode('file')" id="fileTab">
        📎 File
      </button>
    </div>

    <!-- Text Mode -->
    <div id="textMode">
      <div class="text-box">
        <textarea class="textarea" id="msgInput" placeholder="Type a message to encrypt — or paste an encrypted message to decrypt…" oninput="handleInput()"></textarea>
        <div class="count" id="charCount">0 chars</div>
      </div>
    </div>

    <!-- File Mode -->
    <div id="fileMode" class="hidden">
      <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
      
      <div id="dropZone" class="upload" onclick="$('fileInput').click()">
        <div class="upload-emoji">📁</div>
        <div class="upload-title">Click to choose or drag & drop</div>
        <div class="upload-hint">Images, PDFs, documents — up to 50MB</div>
      </div>

      <div id="filePreview" class="hidden">
        <div class="preview">
          <div class="file-icon" id="fileIcon">📄</div>
          <div class="file-info">
            <div class="file-name" id="fileName">filename.pdf</div>
            <div class="file-size" id="fileSize">0 KB</div>
          </div>
          <button class="btn-remove" onclick="removeFile()">✕ Remove</button>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-main" id="mainBtn" onclick="autoProcess()" disabled>
        <span id="btnText">🔐 Encrypt</span>
      </button>
      <button class="btn-sec" onclick="clearAll()">Clear All</button>
    </div>

    <!-- Output -->
    <div class="output" id="outputSection">
      <div class="output-label" id="outputLabel">
        <div class="indicator"></div>
        <span id="labelText"></span>
      </div>
      <div class="output-box" id="outputBox">
        <div class="output-text" id="outputText"></div>
        <div class="output-actions">
          <button class="out-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
          <button class="out-btn" id="downloadBtn" onclick="downloadOutput()">💾</button>
        </div>
      </div>
      <div class="info" id="infoTag"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  const enc = str => new TextEncoder().encode(str);
  const dec = buf => new TextDecoder().decode(buf);
  const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const fromB64 = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  const VERSION = 'v2';
  const ITERATIONS = 600000;
  const SALT_SIZE = 16;
  const MAX_FILE_SIZE = 50 * 1024 * 1024;

  let currentMode = 'text';
  let selectedFile = null;
  let lastOutputData = null;
  let lastOutputMode = 'encrypt';
  let lastOutputFilename = '';

  // Card glow effect
  const card = $('card');
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    card.style.setProperty('--x', `${x}px`);
    card.style.setProperty('--y', `${y}px`);
  });

  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('cipher_key');
    if (saved) {
      $('secretKey').value = saved;
      $('rememberKey').checked = true;
      updateStrength();
    }
    setupDragDrop();
  });

  function setupDragDrop() {
    const zone = $('dropZone');
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
      zone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
      });
    });

    zone.addEventListener('dragenter', () => zone.classList.add('drag-over'));
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('dragover', () => zone.classList.add('drag-over'));
    
    zone.addEventListener('drop', e => {
      zone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });
  }

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function toggleCheck() {
    const cb = $('rememberKey');
    cb.checked = !cb.checked;
    handleRememberKey();
  }

  function switchMode(mode) {
    currentMode = mode;
    $('textTab').classList.toggle('active', mode === 'text');
    $('fileTab').classList.toggle('active', mode === 'file');
    $('textMode').classList.toggle('hidden', mode !== 'text');
    $('fileMode').classList.toggle('hidden', mode !== 'file');
    $('outputSection').classList.remove('show');
    
    updateButtonState();
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) handleFile(file);
  }

  function handleFile(file) {
    if (file.size > MAX_FILE_SIZE) {
      toast('⚠️ File too large! Max 50MB');
      return;
    }

    selectedFile = file;
    
    const icons = {
      'image/': '🖼️',
      'application/pdf': '📕',
      'video/': '🎬',
      'audio/': '🎵',
      'text/': '📝',
      'application/zip': '📦',
      'application/x-': '📦'
    };

    let icon = '📄';
    for (const [type, emoji] of Object.entries(icons)) {
      if (file.type.startsWith(type)) {
        icon = emoji;
        break;
      }
    }

    $('fileIcon').textContent = icon;
    $('fileName').textContent = file.name;
    $('fileSize').textContent = formatSize(file.size);
    $('dropZone').classList.add('has-file');
    $('filePreview').classList.remove('hidden');
    
    updateButtonState();
  }

  function removeFile() {
    selectedFile = null;
    $('fileInput').value = '';
    $('dropZone').classList.remove('has-file');
    $('filePreview').classList.add('hidden');
    updateButtonState();
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function updateButtonState() {
    const btn = $('mainBtn');
    const btnText = $('btnText');
    const hasKey = $('secretKey').value.length >= 8;
    
    if (currentMode === 'text') {
      const val = $('msgInput').value;
      const hasMsg = val.length > 0;
      btn.disabled = !hasKey || !hasMsg;
      
      // Auto-detect encrypt vs decrypt
      const isEncrypted = val.trim().startsWith(VERSION + ':');
      btnText.textContent = isEncrypted ? '🔓 Decrypt' : '🔐 Encrypt';
    } else {
      const hasFile = selectedFile !== null;
      btn.disabled = !hasKey || !hasFile;
      
      // Auto-detect for files
      const isEncryptedFile = selectedFile && selectedFile.name.endsWith('.encrypted');
      btnText.textContent = isEncryptedFile ? '🔓 Decrypt File' : '🔐 Encrypt File';
    }
  }

  function handleInput() {
    const val = $('msgInput').value;
    const n = val.length;
    $('charCount').textContent = n ? `${n} char${n !== 1 ? 's' : ''}` : '0 chars';
    updateButtonState();
  }

  function handleRememberKey() {
    const checked = $('rememberKey').checked;
    const key = $('secretKey').value;
    
    if (checked && key) {
      sessionStorage.setItem('cipher_key', key);
      toast('🔑 Key saved for this session');
    } else {
      sessionStorage.removeItem('cipher_key');
      if (!checked) toast('Key cleared from session');
    }
  }

  async function deriveKey(password, salt) {
    const base = await crypto.subtle.importKey('raw', enc(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
      base,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptText() {
    const password = $('secretKey').value;
    const message  = $('msgInput').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!message)  { showOutput('error', 'Enter a message to encrypt.'); return; }
    if (password.length < 8) {
      showOutput('error', 'Key must be at least 8 characters for security.');
      return;
    }

    try {
      const salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      const key = await deriveKey(password, salt);
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc(message));

      const payload = VERSION + ':text:' + 
                     toB64(salt.buffer) + ':' + 
                     toB64(iv.buffer) + ':' + 
                     toB64(encrypted);

      lastOutputData = payload;
      lastOutputMode = 'encrypt';
      lastOutputFilename = 'encrypted-message.txt';
      showOutput('success', payload, false, 'Encrypted — share this', 
        `${ITERATIONS.toLocaleString()} iterations • AES-256-GCM`);
    } catch (err) {
      showOutput('error', 'Encryption failed: ' + err.message);
    }
  }

  async function decryptText() {
    const password = $('secretKey').value;
    const cipher   = $('msgInput').value.trim();
    
    if (!password) { showOutput('error', 'Enter the secret key first.'); return; }
    if (!cipher)   { showOutput('error', 'Paste an encrypted message to decrypt.'); return; }

    try {
      const parts = cipher.split(':');
      
      if (parts.length < 4) {
        showOutput('error', 'Invalid encrypted message format.');
        return;
      }

      const [version, type, saltB64, ivB64, ctB64] = parts;
      
      if (version !== VERSION) {
        showOutput('error', `Unsupported version: ${version}`);
        return;
      }

      if (type !== 'text') {
        showOutput('error', 'This appears to be an encrypted file. Switch to File mode to decrypt it.');
        return;
      }

      const salt = fromB64(saltB64);
      const iv   = fromB64(ivB64);
      const ct   = fromB64(ctB64);
      
      const key = await deriveKey(password, salt);
      const result = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      const plaintext = dec(result);
      
      lastOutputData = plaintext;
      lastOutputMode = 'decrypt';
      lastOutputFilename = 'decrypted-message.txt';
      showOutput('success', plaintext, true, 'Decrypted message', '✓ Verified authentic');
    } catch (err) {
      if (err.name === 'OperationError') {
        showOutput('error', '❌ Wrong key or corrupted data.');
      } else {
        showOutput('error', 'Decryption failed: ' + err.message);
      }
    }
  }

  async function encryptFile() {
    const password = $('secretKey').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!selectedFile) { showOutput('error', 'Select a file to encrypt.'); return; }
    if (password.length < 8) {
      showOutput('error', 'Key must be at least 8 characters for security.');
      return;
    }

    try {
      toast('🔐 Encrypting file...');
      
      const fileData = await selectedFile.arrayBuffer();
      const salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      const key = await deriveKey(password, salt);
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, fileData);

      const filenameBytes = enc(selectedFile.name);
      const filenameLen = new Uint8Array([filenameBytes.length]);
      
      const combined = new Uint8Array(
        salt.length + iv.length + 1 + filenameBytes.length + encrypted.byteLength
      );
      let offset = 0;
      combined.set(salt, offset); offset += salt.length;
      combined.set(iv, offset); offset += iv.length;
      combined.set(filenameLen, offset); offset += 1;
      combined.set(filenameBytes, offset); offset += filenameBytes.length;
      combined.set(new Uint8Array(encrypted), offset);

      const blob = new Blob([combined], { type: 'application/octet-stream' });
      lastOutputData = blob;
      lastOutputMode = 'encrypt-file';
      lastOutputFilename = selectedFile.name + '.encrypted';
      
      showOutput('success', `File encrypted: ${selectedFile.name}\n${formatSize(blob.size)}`, true,
        'Encrypted file ready', '🔒 Download to share with your friend');
    } catch (err) {
      showOutput('error', 'File encryption failed: ' + err.message);
    }
  }

  async function decryptFile() {
    const password = $('secretKey').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!selectedFile) { showOutput('error', 'Select an encrypted file.'); return; }

    try {
      toast('🔓 Decrypting file...');
      
      const encryptedData = await selectedFile.arrayBuffer();
      const data = new Uint8Array(encryptedData);
      
      let offset = 0;
      const salt = data.slice(offset, offset + SALT_SIZE); offset += SALT_SIZE;
      const iv = data.slice(offset, offset + 12); offset += 12;
      const filenameLen = data[offset]; offset += 1;
      const filenameBytes = data.slice(offset, offset + filenameLen); offset += filenameLen;
      const ciphertext = data.slice(offset);
      
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      
      const originalFilename = dec(filenameBytes);
      const blob = new Blob([decrypted]);
      
      lastOutputData = blob;
      lastOutputMode = 'decrypt-file';
      lastOutputFilename = originalFilename;
      
      showOutput('success', `File decrypted: ${originalFilename}\n${formatSize(blob.size)}`, true,
        'Decrypted file ready', '✓ Original file restored — download it');
    } catch (err) {
      if (err.name === 'OperationError') {
        showOutput('error', '❌ Wrong key or corrupted file.');
      } else {
        showOutput('error', 'File decryption failed: ' + err.message);
      }
    }
  }

  async function autoProcess() {
    if (currentMode === 'text') {
      const input = $('msgInput').value.trim();
      const isEncrypted = input.startsWith(VERSION + ':');
      if (isEncrypted) await decryptText();
      else await encryptText();
    } else {
      const isEncryptedFile = selectedFile && selectedFile.name.endsWith('.encrypted');
      if (isEncryptedFile) await decryptFile();
      else await encryptFile();
    }
  }

  function showOutput(type, text, isPlain, headerText, infoText = '') {
    const section = $('outputSection');
    section.classList.remove('show');
    void section.offsetWidth;
    section.classList.add('show');

    const isError = type === 'error';
    $('outputLabel').className = 'output-label ' + type;
    $('labelText').textContent = isError ? 'Error' : headerText;
    $('outputBox').className = 'output-box ' + type;
    $('outputText').className = 'output-text' + (isError ? ' error' : isPlain ? ' plain' : '');
    $('outputText').textContent = text;
    
    $('copyBtn').style.display = (isError || lastOutputMode.includes('file')) ? 'none' : 'block';
    $('downloadBtn').style.display = isError ? 'none' : 'block';
    $('copyBtn').textContent = 'Copy';
    $('copyBtn').classList.remove('copied');
    
    const tag = $('infoTag');
    if (infoText && !isError) {
      tag.textContent = infoText;
      tag.style.display = 'inline-flex';
    } else {
      tag.style.display = 'none';
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText($('outputText').textContent);
    $('copyBtn').textContent = 'Copied!';
    $('copyBtn').classList.add('copied');
    toast('📋 Copied to clipboard');
    setTimeout(() => { $('copyBtn').textContent = 'Copy'; $('copyBtn').classList.remove('copied'); }, 2000);
  }

  function downloadOutput() {
    let blob, filename;
    
    if (lastOutputMode.includes('file')) {
      blob = lastOutputData;
      filename = lastOutputFilename;
    } else {
      blob = new Blob([lastOutputData], { type: 'text/plain' });
      filename = lastOutputFilename;
    }
    
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    toast('💾 Downloaded: ' + filename);
  }

  function generateKey() {
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*';
    const rand = crypto.getRandomValues(new Uint8Array(24));
    $('secretKey').value = Array.from(rand).map(b => chars[b % chars.length]).join('');
    updateStrength();
    if ($('rememberKey').checked) handleRememberKey();
    toast('🎲 Strong key generated — share it securely!');
  }

  function copyKey() {
    const v = $('secretKey').value;
    if (!v) { toast('Generate a key first'); return; }
    navigator.clipboard.writeText(v);
    toast('🔑 Key copied to clipboard');
  }

  function toggleVis() {
    const el = $('secretKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function clearAll() {
    $('msgInput').value = '';
    removeFile();
    $('outputSection').classList.remove('show');
    updateButtonState();
    toast('🗑 Cleared');
  }

  function updateStrength() {
    const val = $('secretKey').value;
    const fill = $('meterFill');
    const badge = $('strengthBadge');
    
    if (!val) { 
      fill.style.width = '0%'; 
      badge.textContent = ''; 
      updateButtonState();
      return; 
    }

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (val.length >= 16) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: '20%', color: '#ef4444', label: 'Too Weak' },
      { w: '35%', color: '#f59e0b', label: 'Weak' },
      { w: '50%', color: '#eab308', label: 'Fair' },
      { w: '65%', color: '#84cc16', label: 'Good' },
      { w: '80%', color: '#10b981', label: 'Strong' },
      { w: '100%', color: '#059669', label: 'Excellent' },
    ];

    const lvl = levels[Math.min(score, 5)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.color;
    badge.style.color = lvl.color;
    badge.textContent = lvl.label;
    
    updateButtonState();
  }

  $('secretKey').addEventListener('input', updateStrength);
</script>
</body>
</html>
