<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #13111a;
    --card: #1c1926;
    --surface: #231f30;
    --border: #2e2840;
    --accent: #c084fc;
    --accent-dim: rgba(192,132,252,0.12);
    --accent-glow: rgba(192,132,252,0.25);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --text: #f0ecff;
    --muted: #7c6fa0;
    --danger: #f87171;
    --warning: #facc15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: #4f46e5; bottom: -100px; left: -100px; }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    animation: rise 0.6s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .lock-icon {
    width: 36px; height: 36px;
    background: var(--accent-dim);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .key-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 4px 4px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .key-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .key-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    min-width: 0;
    letter-spacing: 0.05em;
  }

  .key-box input::placeholder { color: var(--muted); }

  .key-actions { display: flex; gap: 4px; }

  .pill-btn {
    background: var(--border);
    border: none;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill-btn:hover { background: #3a3350; color: var(--text); }
  .pill-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .pill-btn.accent {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(192,132,252,0.2);
  }

  .pill-btn.accent:hover {
    background: rgba(192,132,252,0.2);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .strength-bar {
    height: 2px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 8px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s, background 0.4s;
    width: 0%;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 10px;
    background: rgba(192,132,252,0.05);
    border-radius: 8px;
    border: 1px solid rgba(192,132,252,0.1);
  }

  .checkbox-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .checkbox-row label {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .msg-area {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .msg-area:focus-within {
    border-color: rgba(192,132,252,0.4);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .msg-area textarea {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    min-height: 100px;
  }

  .msg-area textarea::placeholder { color: var(--muted); }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .act-btn {
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .act-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-auto {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
    grid-column: 1 / -1;
  }

  .btn-auto:not(:disabled):hover {
    background: #d8b4fe;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px var(--accent-glow);
  }

  .btn-clear {
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
    font-size: 12px;
    padding: 10px;
  }

  .btn-clear:hover {
    background: #2a2538;
    border-color: var(--muted);
  }

  .act-btn:active:not(:disabled) { transform: translateY(0) !important; }

  .output-section {
    display: none;
  }

  .output-section.visible {
    display: block;
    animation: popIn 0.35s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .output-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .output-label.success { color: var(--green); }
  .output-label.error   { color: var(--danger); }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .output-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    position: relative;
  }

  .output-box.success { border-color: rgba(74,222,128,0.3); }
  .output-box.error   { border-color: rgba(248,113,113,0.3); }

  .output-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-all;
    padding-right: 70px;
    min-height: 40px;
  }

  .output-text.is-error { color: var(--danger); font-family: 'Sora', sans-serif; font-size: 13px; word-break: normal; }
  .output-text.is-plain { font-family: 'Sora', sans-serif; font-size: 14px; word-break: normal; line-height: 1.7; }

  .output-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 4px;
  }

  .out-pill {
    background: var(--border);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .out-pill:hover { background: #3a3350; color: var(--text); }
  .out-pill.copied { background: var(--green-dim); color: var(--green); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #2e2840;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    background: rgba(192,132,252,0.05);
    padding: 4px 10px;
    border-radius: 6px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">
  <div class="header">
    <div class="logo-wrap">
      <div class="lock-icon">🔒</div>
      <h1>Cipher Pro</h1>
    </div>
    <p class="tagline">Military-grade AES-256 encryption</p>
  </div>

  <div class="card">

    <div style="margin-bottom:24px;">
      <div class="field-label">
        <span>Secret Key</span>
        <span id="strengthLabel" style="font-size:11px;"></span>
      </div>
      <div class="key-box">
        <input type="password" id="secretKey" placeholder="Enter or generate a shared key…" oninput="updateStrength()" />
        <div class="key-actions">
          <button class="pill-btn" onclick="toggleVis()" title="Show/hide">👁</button>
          <button class="pill-btn" onclick="copyKey()">Copy</button>
          <button class="pill-btn accent" onclick="generateKey()">Generate</button>
        </div>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      
      <div class="checkbox-row">
        <input type="checkbox" id="rememberKey" onchange="handleRememberKey()">
        <label for="rememberKey">Remember key this session (⚠️ clears on browser close)</label>
      </div>
    </div>

    <div class="divider">message</div>

    <div class="msg-area">
      <textarea id="msgInput" placeholder="Type a message to encrypt — or paste an encrypted message to decrypt…" oninput="handleInput()"></textarea>
      <div class="char-count" id="charCount">0 chars</div>
    </div>

    <div class="actions">
      <button class="act-btn btn-auto" id="autoBtn" onclick="autoProcess()" disabled>
        <span id="autoBtnText">🔐 Encrypt</span>
      </button>
      <button class="act-btn btn-clear" onclick="clearAll()">🗑 Clear All</button>
    </div>

    <div class="output-section" id="outputSection">
      <div class="output-label" id="outputLabel">
        <div class="dot"></div>
        <span id="outputLabelText"></span>
      </div>
      <div class="output-box" id="outputBox">
        <div class="output-text" id="outputText"></div>
        <div class="output-actions">
          <button class="out-pill" id="copyPill" onclick="copyOutput()">Copy</button>
          <button class="out-pill" id="downloadPill" onclick="downloadOutput()">💾</button>
        </div>
      </div>
      <div class="info-badge" id="infoBadge"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  const enc = str => new TextEncoder().encode(str);
  const dec = buf => new TextDecoder().decode(buf);
  const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const fromB64 = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  const VERSION = 'v2';
  const ITERATIONS = 600000; // Increased from 100k to 600k for better security
  const SALT_SIZE = 16; // Random salt per encryption

  let lastOutputText = '';
  let lastOutputMode = 'encrypt';

  // Load saved key on startup
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('cipher_key');
    if (saved) {
      $('secretKey').value = saved;
      $('rememberKey').checked = true;
      updateStrength();
    }
  });

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function handleInput() {
    const val = $('msgInput').value;
    const n = val.length;
    $('charCount').textContent = n ? `${n} char${n !== 1 ? 's' : ''}` : '0 chars';
    
    const btn = $('autoBtn');
    const hasKey = $('secretKey').value.length > 0;
    const hasMsg = val.length > 0;
    
    btn.disabled = !hasKey || !hasMsg;
    
    // Auto-detect if input looks like encrypted data
    const isEncrypted = val.trim().startsWith(VERSION + ':');
    const btnText = isEncrypted ? '🔓 Decrypt' : '🔐 Encrypt';
    $('autoBtnText').textContent = btnText;
  }

  function handleRememberKey() {
    const checked = $('rememberKey').checked;
    const key = $('secretKey').value;
    
    if (checked && key) {
      sessionStorage.setItem('cipher_key', key);
      toast('🔑 Key saved for this session');
    } else {
      sessionStorage.removeItem('cipher_key');
      if (!checked) toast('Key cleared from session');
    }
  }

  async function deriveKey(password, salt) {
    const base = await crypto.subtle.importKey('raw', enc(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
      base,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptMsg() {
    const password = $('secretKey').value;
    const message  = $('msgInput').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!message)  { showOutput('error', 'Enter a message to encrypt.'); return; }
    
    if (password.length < 8) {
      showOutput('error', 'Key must be at least 8 characters for security.');
      return;
    }

    try {
      // Generate random salt for this encryption
      const salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      const key = await deriveKey(password, salt);
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc(message));

      // Format: VERSION:SALT:IV:CIPHERTEXT (all base64)
      const payload = VERSION + ':' + 
                     toB64(salt.buffer) + ':' + 
                     toB64(iv.buffer) + ':' + 
                     toB64(encrypted);

      lastOutputText = payload;
      lastOutputMode = 'encrypt';
      showOutput('success', payload, false, 'Encrypted — share this', 
        `${ITERATIONS.toLocaleString()} iterations • AES-256-GCM • Random salt`);
    } catch (err) {
      showOutput('error', 'Encryption failed: ' + err.message);
    }
  }

  async function decryptMsg() {
    const password = $('secretKey').value;
    const cipher   = $('msgInput').value.trim();
    
    if (!password) { showOutput('error', 'Enter the secret key first.'); return; }
    if (!cipher)   { showOutput('error', 'Paste an encrypted message to decrypt.'); return; }

    try {
      // Parse format: VERSION:SALT:IV:CIPHERTEXT
      const parts = cipher.split(':');
      
      if (parts.length !== 4) {
        showOutput('error', 'Invalid encrypted message format.');
        return;
      }

      const [version, saltB64, ivB64, ctB64] = parts;
      
      if (version !== VERSION) {
        showOutput('error', `Unsupported version: ${version}. This tool supports ${VERSION}.`);
        return;
      }

      const salt = fromB64(saltB64);
      const iv   = fromB64(ivB64);
      const ct   = fromB64(ctB64);
      
      const key = await deriveKey(password, salt);
      const result = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      const plaintext = dec(result);
      
      lastOutputText = plaintext;
      lastOutputMode = 'decrypt';
      showOutput('success', plaintext, true, 'Decrypted message', '✓ Verified authentic');
    } catch (err) {
      if (err.name === 'OperationError') {
        showOutput('error', '❌ Wrong key or corrupted message. Authentication failed.');
      } else {
        showOutput('error', 'Decryption failed: ' + err.message);
      }
    }
  }

  function autoProcess() {
    const input = $('msgInput').value.trim();
    const isEncrypted = input.startsWith(VERSION + ':');
    
    if (isEncrypted) {
      decryptMsg();
    } else {
      encryptMsg();
    }
  }

  function showOutput(type, text, isPlain, labelText, infoBadgeText = '') {
    const section = $('outputSection');
    section.classList.remove('visible');
    void section.offsetWidth;
    section.classList.add('visible');

    const isError = type === 'error';
    $('outputLabel').className = 'output-label ' + type;
    $('outputLabelText').textContent = isError ? 'Error' : labelText;
    $('outputBox').className = 'output-box ' + type;
    $('outputText').className = 'output-text' + (isError ? ' is-error' : isPlain ? ' is-plain' : '');
    $('outputText').textContent = text;
    
    $('copyPill').style.display = isError ? 'none' : 'block';
    $('downloadPill').style.display = isError ? 'none' : 'block';
    $('copyPill').textContent = 'Copy';
    $('copyPill').classList.remove('copied');
    
    const badge = $('infoBadge');
    if (infoBadgeText && !isError) {
      badge.textContent = infoBadgeText;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText($('outputText').textContent);
    $('copyPill').textContent = 'Copied!';
    $('copyPill').classList.add('copied');
    toast('📋 Copied to clipboard');
    setTimeout(() => { $('copyPill').textContent = 'Copy'; $('copyPill').classList.remove('copied'); }, 2000);
  }

  function downloadOutput() {
    const text = lastOutputText;
    const filename = lastOutputMode === 'encrypt' ? 'encrypted-message.txt' : 'decrypted-message.txt';
    
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    toast('💾 Downloaded as ' + filename);
  }

  function generateKey() {
    // More secure character set avoiding ambiguous characters
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*';
    const rand = crypto.getRandomValues(new Uint8Array(24)); // Increased length
    $('secretKey').value = Array.from(rand).map(b => chars[b % chars.length]).join('');
    updateStrength();
    handleRememberKey(); // Auto-save if checkbox is checked
    toast('🎲 Strong key generated — share it securely!');
  }

  function copyKey() {
    const v = $('secretKey').value;
    if (!v) { toast('Generate a key first'); return; }
    navigator.clipboard.writeText(v);
    toast('🔑 Key copied to clipboard');
  }

  function toggleVis() {
    const el = $('secretKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function clearAll() {
    $('msgInput').value = '';
    $('outputSection').classList.remove('visible');
    handleInput();
    toast('🗑 Cleared');
  }

  function updateStrength() {
    const val = $('secretKey').value;
    const fill = $('strengthFill');
    const lbl  = $('strengthLabel');
    const btn = $('autoBtn');
    
    if (!val) { 
      fill.style.width = '0%'; 
      lbl.textContent = ''; 
      btn.disabled = true;
      return; 
    }

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (val.length >= 16) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: '20%', color: '#f87171', label: 'Too Weak' },
      { w: '35%', color: '#fb923c', label: 'Weak' },
      { w: '50%', color: '#facc15', label: 'Fair' },
      { w: '65%', color: '#a3e635', label: 'Good' },
      { w: '80%', color: '#4ade80', label: 'Strong' },
      { w: '100%', color: '#22c55e', label: 'Excellent' },
    ];

    const lvl = levels[Math.min(score, 5)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.color;
    lbl.style.color = lvl.color;
    lbl.textContent = lvl.label;
    
    handleInput(); // Update button state
  }

  // Update button state on key change
  $('secretKey').addEventListener('input', updateStrength);
</script>
</body>
</html>
