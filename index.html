<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #13111a;
    --card: #1c1926;
    --surface: #231f30;
    --border: #2e2840;
    --accent: #c084fc;
    --accent-dim: rgba(192,132,252,0.12);
    --accent-glow: rgba(192,132,252,0.25);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --text: #f0ecff;
    --muted: #7c6fa0;
    --danger: #f87171;
    --warning: #facc15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: #4f46e5; bottom: -100px; left: -100px; }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
    animation: rise 0.6s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .lock-icon {
    width: 36px; height: 36px;
    background: var(--accent-dim);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .key-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 4px 4px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .key-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .key-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    min-width: 0;
    letter-spacing: 0.05em;
  }

  .key-box input::placeholder { color: var(--muted); }

  .key-actions { display: flex; gap: 4px; }

  .pill-btn {
    background: var(--border);
    border: none;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill-btn:hover { background: #3a3350; color: var(--text); }
  .pill-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .pill-btn.accent {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(192,132,252,0.2);
  }

  .pill-btn.accent:hover {
    background: rgba(192,132,252,0.2);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .strength-bar {
    height: 2px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 8px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s, background 0.4s;
    width: 0%;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 10px;
    background: rgba(192,132,252,0.05);
    border-radius: 8px;
    border: 1px solid rgba(192,132,252,0.1);
  }

  .checkbox-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .checkbox-row label {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .mode-tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .mode-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .msg-area {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .msg-area:focus-within {
    border-color: rgba(192,132,252,0.4);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .msg-area textarea {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    min-height: 100px;
  }

  .msg-area textarea::placeholder { color: var(--muted); }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .file-drop-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    margin-bottom: 14px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .file-drop-zone:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .file-drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: scale(1.02);
  }

  .file-drop-zone.has-file {
    background: rgba(74,222,128,0.08);
    border-color: var(--green);
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .upload-text {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .file-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 14px;
  }

  .file-details {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .file-icon {
    width: 40px;
    height: 40px;
    background: var(--accent-dim);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .file-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .file-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .file-size {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .remove-file {
    background: var(--border);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .remove-file:hover {
    background: var(--danger);
    color: #fff;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .act-btn {
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .act-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-auto {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
    grid-column: 1 / -1;
  }

  .btn-auto:not(:disabled):hover {
    background: #d8b4fe;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px var(--accent-glow);
  }

  .btn-clear {
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
    font-size: 12px;
    padding: 10px;
  }

  .btn-clear:hover {
    background: #2a2538;
    border-color: var(--muted);
  }

  .act-btn:active:not(:disabled) { transform: translateY(0) !important; }

  .output-section {
    display: none;
  }

  .output-section.visible {
    display: block;
    animation: popIn 0.35s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .output-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .output-label.success { color: var(--green); }
  .output-label.error   { color: var(--danger); }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .output-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    position: relative;
  }

  .output-box.success { border-color: rgba(74,222,128,0.3); }
  .output-box.error   { border-color: rgba(248,113,113,0.3); }

  .output-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-all;
    padding-right: 70px;
    min-height: 40px;
  }

  .output-text.is-error { color: var(--danger); font-family: 'Sora', sans-serif; font-size: 13px; word-break: normal; }
  .output-text.is-plain { font-family: 'Sora', sans-serif; font-size: 14px; word-break: normal; line-height: 1.7; }

  .output-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 4px;
  }

  .out-pill {
    background: var(--border);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .out-pill:hover { background: #3a3350; color: var(--text); }
  .out-pill.copied { background: var(--green-dim); color: var(--green); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #2e2840;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    background: rgba(192,132,252,0.05);
    padding: 4px 10px;
    border-radius: 6px;
    margin-top: 6px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">
  <div class="header">
    <div class="logo-wrap">
      <div class="lock-icon">🔒</div>
      <h1>Cipher Pro</h1>
    </div>
    <p class="tagline">Encrypt messages, images & files with AES-256</p>
  </div>

  <div class="card">

    <div style="margin-bottom:24px;">
      <div class="field-label">
        <span>Secret Key</span>
        <span id="strengthLabel" style="font-size:11px;"></span>
      </div>
      <div class="key-box">
        <input type="password" id="secretKey" placeholder="Enter or generate a shared key…" oninput="updateStrength()" />
        <div class="key-actions">
          <button class="pill-btn" onclick="toggleVis()" title="Show/hide">👁</button>
          <button class="pill-btn" onclick="copyKey()">Copy</button>
          <button class="pill-btn accent" onclick="generateKey()">Generate</button>
        </div>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      
      <div class="checkbox-row">
        <input type="checkbox" id="rememberKey" onchange="handleRememberKey()">
        <label for="rememberKey">Remember key this session (⚠️ clears on browser close)</label>
      </div>
    </div>

    <div class="divider">mode</div>

    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode('text')" id="textTab">
        💬 Text
      </button>
      <button class="mode-tab" onclick="switchMode('file')" id="fileTab">
        📎 File
      </button>
    </div>

    <!-- TEXT MODE -->
    <div id="textMode">
      <div class="msg-area">
        <textarea id="msgInput" placeholder="Type a message to encrypt — or paste an encrypted message to decrypt…" oninput="handleInput()"></textarea>
        <div class="char-count" id="charCount">0 chars</div>
      </div>
    </div>

    <!-- FILE MODE -->
    <div id="fileMode" class="hidden">
      <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
      
      <div id="dropZone" class="file-drop-zone" onclick="$('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Click to choose or drag & drop</div>
        <div class="upload-hint">Images, PDFs, documents — up to 50MB</div>
      </div>

      <div id="fileInfoBox" class="hidden">
        <div class="file-info">
          <div class="file-details">
            <div class="file-icon" id="fileIcon">📄</div>
            <div class="file-meta">
              <div class="file-name" id="fileName">filename.pdf</div>
              <div class="file-size" id="fileSize">0 KB</div>
            </div>
          </div>
          <button class="remove-file" onclick="removeFile()">✕ Remove</button>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="act-btn btn-auto" id="autoBtn" onclick="autoProcess()" disabled>
        <span id="autoBtnText">🔐 Encrypt</span>
      </button>
      <button class="act-btn btn-clear" onclick="clearAll()">🗑 Clear All</button>
    </div>

    <div class="output-section" id="outputSection">
      <div class="output-label" id="outputLabel">
        <div class="dot"></div>
        <span id="outputLabelText"></span>
      </div>
      <div class="output-box" id="outputBox">
        <div class="output-text" id="outputText"></div>
        <div class="output-actions">
          <button class="out-pill" id="copyPill" onclick="copyOutput()">Copy</button>
          <button class="out-pill" id="downloadPill" onclick="downloadOutput()">💾</button>
        </div>
      </div>
      <div class="info-badge" id="infoBadge"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  const enc = str => new TextEncoder().encode(str);
  const dec = buf => new TextDecoder().decode(buf);
  const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const fromB64 = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  const VERSION = 'v2';
  const ITERATIONS = 600000;
  const SALT_SIZE = 16;
  const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50MB

  let currentMode = 'text';
  let selectedFile = null;
  let lastOutputData = null;
  let lastOutputMode = 'encrypt';
  let lastOutputFilename = '';

  // Load saved key on startup
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('cipher_key');
    if (saved) {
      $('secretKey').value = saved;
      $('rememberKey').checked = true;
      updateStrength();
    }
    setupDragDrop();
  });

  function setupDragDrop() {
    const zone = $('dropZone');
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
      zone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
      });
    });

    zone.addEventListener('dragenter', () => zone.classList.add('drag-over'));
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('dragover', () => zone.classList.add('drag-over'));
    
    zone.addEventListener('drop', e => {
      zone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });
  }

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function switchMode(mode) {
    currentMode = mode;
    $('textTab').classList.toggle('active', mode === 'text');
    $('fileTab').classList.toggle('active', mode === 'file');
    $('textMode').classList.toggle('hidden', mode !== 'text');
    $('fileMode').classList.toggle('hidden', mode !== 'file');
    $('outputSection').classList.remove('visible');
    
    if (mode === 'text') {
      handleInput();
    } else {
      updateFileButton();
    }
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) handleFile(file);
  }

  function handleFile(file) {
    if (file.size > MAX_FILE_SIZE) {
      toast('⚠️ File too large! Max 50MB');
      return;
    }

    selectedFile = file;
    
    const icons = {
      'image/': '🖼️',
      'application/pdf': '📕',
      'video/': '🎬',
      'audio/': '🎵',
      'text/': '📝',
      'application/zip': '📦',
      'application/x-': '📦'
    };

    let icon = '📄';
    for (const [type, emoji] of Object.entries(icons)) {
      if (file.type.startsWith(type)) {
        icon = emoji;
        break;
      }
    }

    $('fileIcon').textContent = icon;
    $('fileName').textContent = file.name;
    $('fileSize').textContent = formatSize(file.size);
    $('dropZone').classList.add('has-file');
    $('fileInfoBox').classList.remove('hidden');
    
    updateFileButton();
  }

  function removeFile() {
    selectedFile = null;
    $('fileInput').value = '';
    $('dropZone').classList.remove('has-file');
    $('fileInfoBox').classList.add('hidden');
    updateFileButton();
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function updateFileButton() {
    const btn = $('autoBtn');
    const hasKey = $('secretKey').value.length > 0;
    const hasFile = selectedFile !== null;
    
    btn.disabled = !hasKey || !hasFile;
    $('autoBtnText').textContent = '🔐 Encrypt File';
  }

  function handleInput() {
    const val = $('msgInput').value;
    const n = val.length;
    $('charCount').textContent = n ? `${n} char${n !== 1 ? 's' : ''}` : '0 chars';
    
    const btn = $('autoBtn');
    const hasKey = $('secretKey').value.length > 0;
    const hasMsg = val.length > 0;
    
    btn.disabled = !hasKey || !hasMsg;
    
    const isEncrypted = val.trim().startsWith(VERSION + ':');
    const btnText = isEncrypted ? '🔓 Decrypt' : '🔐 Encrypt';
    $('autoBtnText').textContent = btnText;
  }

  function handleRememberKey() {
    const checked = $('rememberKey').checked;
    const key = $('secretKey').value;
    
    if (checked && key) {
      sessionStorage.setItem('cipher_key', key);
      toast('🔑 Key saved for this session');
    } else {
      sessionStorage.removeItem('cipher_key');
      if (!checked) toast('Key cleared from session');
    }
  }

  async function deriveKey(password, salt) {
    const base = await crypto.subtle.importKey('raw', enc(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
      base,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptText() {
    const password = $('secretKey').value;
    const message  = $('msgInput').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!message)  { showOutput('error', 'Enter a message to encrypt.'); return; }
    if (password.length < 8) {
      showOutput('error', 'Key must be at least 8 characters for security.');
      return;
    }

    try {
      const salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      const key = await deriveKey(password, salt);
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc(message));

      const payload = VERSION + ':text:' + 
                     toB64(salt.buffer) + ':' + 
                     toB64(iv.buffer) + ':' + 
                     toB64(encrypted);

      lastOutputData = payload;
      lastOutputMode = 'encrypt';
      lastOutputFilename = 'encrypted-message.txt';
      showOutput('success', payload, false, 'Encrypted — share this', 
        `${ITERATIONS.toLocaleString()} iterations • AES-256-GCM`);
    } catch (err) {
      showOutput('error', 'Encryption failed: ' + err.message);
    }
  }

  async function decryptText() {
    const password = $('secretKey').value;
    const cipher   = $('msgInput').value.trim();
    
    if (!password) { showOutput('error', 'Enter the secret key first.'); return; }
    if (!cipher)   { showOutput('error', 'Paste an encrypted message to decrypt.'); return; }

    try {
      const parts = cipher.split(':');
      
      if (parts.length < 4) {
        showOutput('error', 'Invalid encrypted message format.');
        return;
      }

      const [version, type, saltB64, ivB64, ctB64] = parts;
      
      if (version !== VERSION) {
        showOutput('error', `Unsupported version: ${version}`);
        return;
      }

      if (type !== 'text') {
        showOutput('error', 'This appears to be an encrypted file. Switch to File mode to decrypt it.');
        return;
      }

      const salt = fromB64(saltB64);
      const iv   = fromB64(ivB64);
      const ct   = fromB64(ctB64);
      
      const key = await deriveKey(password, salt);
      const result = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      const plaintext = dec(result);
      
      lastOutputData = plaintext;
      lastOutputMode = 'decrypt';
      lastOutputFilename = 'decrypted-message.txt';
      showOutput('success', plaintext, true, 'Decrypted message', '✓ Verified authentic');
    } catch (err) {
      if (err.name === 'OperationError') {
        showOutput('error', '❌ Wrong key or corrupted data.');
      } else {
        showOutput('error', 'Decryption failed: ' + err.message);
      }
    }
  }

  async function encryptFile() {
    const password = $('secretKey').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!selectedFile) { showOutput('error', 'Select a file to encrypt.'); return; }
    if (password.length < 8) {
      showOutput('error', 'Key must be at least 8 characters for security.');
      return;
    }

    try {
      toast('🔐 Encrypting file...');
      
      const fileData = await selectedFile.arrayBuffer();
      const salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      const key = await deriveKey(password, salt);
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, fileData);

      // Store filename with encryption
      const filenameBytes = enc(selectedFile.name);
      const filenameLen = new Uint8Array([filenameBytes.length]);
      
      // Combine: salt + iv + filenameLen + filename + encrypted
      const combined = new Uint8Array(
        salt.length + iv.length + 1 + filenameBytes.length + encrypted.byteLength
      );
      let offset = 0;
      combined.set(salt, offset); offset += salt.length;
      combined.set(iv, offset); offset += iv.length;
      combined.set(filenameLen, offset); offset += 1;
      combined.set(filenameBytes, offset); offset += filenameBytes.length;
      combined.set(new Uint8Array(encrypted), offset);

      const blob = new Blob([combined], { type: 'application/octet-stream' });
      lastOutputData = blob;
      lastOutputMode = 'encrypt-file';
      lastOutputFilename = selectedFile.name + '.encrypted';
      
      showOutput('success', `File encrypted: ${selectedFile.name}\n${formatSize(blob.size)}`, true,
        'Encrypted file ready', '🔒 Download to share with your friend');
    } catch (err) {
      showOutput('error', 'File encryption failed: ' + err.message);
    }
  }

  async function decryptFile() {
    const password = $('secretKey').value;
    
    if (!password) { showOutput('error', 'Enter a secret key first.'); return; }
    if (!selectedFile) { showOutput('error', 'Select an encrypted file.'); return; }

    try {
      toast('🔓 Decrypting file...');
      
      const encryptedData = await selectedFile.arrayBuffer();
      const data = new Uint8Array(encryptedData);
      
      // Extract components
      let offset = 0;
      const salt = data.slice(offset, offset + SALT_SIZE); offset += SALT_SIZE;
      const iv = data.slice(offset, offset + 12); offset += 12;
      const filenameLen = data[offset]; offset += 1;
      const filenameBytes = data.slice(offset, offset + filenameLen); offset += filenameLen;
      const ciphertext = data.slice(offset);
      
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      
      const originalFilename = dec(filenameBytes);
      const blob = new Blob([decrypted]);
      
      lastOutputData = blob;
      lastOutputMode = 'decrypt-file';
      lastOutputFilename = originalFilename;
      
      showOutput('success', `File decrypted: ${originalFilename}\n${formatSize(blob.size)}`, true,
        'Decrypted file ready', '✓ Original file restored — download it');
    } catch (err) {
      if (err.name === 'OperationError') {
        showOutput('error', '❌ Wrong key or corrupted file.');
      } else {
        showOutput('error', 'File decryption failed: ' + err.message);
      }
    }
  }

  async function autoProcess() {
    if (currentMode === 'text') {
      const input = $('msgInput').value.trim();
      const isEncrypted = input.startsWith(VERSION + ':');
      if (isEncrypted) {
        await decryptText();
      } else {
        await encryptText();
      }
    } else {
      // File mode - check if it's encrypted
      if (selectedFile.name.endsWith('.encrypted')) {
        await decryptFile();
      } else {
        await encryptFile();
      }
    }
  }

  function showOutput(type, text, isPlain, labelText, infoBadgeText = '') {
    const section = $('outputSection');
    section.classList.remove('visible');
    void section.offsetWidth;
    section.classList.add('visible');

    const isError = type === 'error';
    $('outputLabel').className = 'output-label ' + type;
    $('outputLabelText').textContent = isError ? 'Error' : labelText;
    $('outputBox').className = 'output-box ' + type;
    $('outputText').className = 'output-text' + (isError ? ' is-error' : isPlain ? ' is-plain' : '');
    $('outputText').textContent = text;
    
    $('copyPill').style.display = (isError || lastOutputMode.includes('file')) ? 'none' : 'block';
    $('downloadPill').style.display = isError ? 'none' : 'block';
    $('copyPill').textContent = 'Copy';
    $('copyPill').classList.remove('copied');
    
    const badge = $('infoBadge');
    if (infoBadgeText && !isError) {
      badge.textContent = infoBadgeText;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText($('outputText').textContent);
    $('copyPill').textContent = 'Copied!';
    $('copyPill').classList.add('copied');
    toast('📋 Copied to clipboard');
    setTimeout(() => { $('copyPill').textContent = 'Copy'; $('copyPill').classList.remove('copied'); }, 2000);
  }

  function downloadOutput() {
    let blob, filename;
    
    if (lastOutputMode.includes('file')) {
      blob = lastOutputData;
      filename = lastOutputFilename;
    } else {
      blob = new Blob([lastOutputData], { type: 'text/plain' });
      filename = lastOutputFilename;
    }
    
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    toast('💾 Downloaded: ' + filename);
  }

  function generateKey() {
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*';
    const rand = crypto.getRandomValues(new Uint8Array(24));
    $('secretKey').value = Array.from(rand).map(b => chars[b % chars.length]).join('');
    updateStrength();
    handleRememberKey();
    toast('🎲 Strong key generated — share it securely!');
  }

  function copyKey() {
    const v = $('secretKey').value;
    if (!v) { toast('Generate a key first'); return; }
    navigator.clipboard.writeText(v);
    toast('🔑 Key copied to clipboard');
  }

  function toggleVis() {
    const el = $('secretKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function clearAll() {
    $('msgInput').value = '';
    removeFile();
    $('outputSection').classList.remove('visible');
    handleInput();
    toast('🗑 Cleared');
  }

  function updateStrength() {
    const val = $('secretKey').value;
    const fill = $('strengthFill');
    const lbl  = $('strengthLabel');
    
    if (!val) { 
      fill.style.width = '0%'; 
      lbl.textContent = ''; 
      if (currentMode === 'text') handleInput();
      else updateFileButton();
      return; 
    }

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (val.length >= 16) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: '20%', color: '#f87171', label: 'Too Weak' },
      { w: '35%', color: '#fb923c', label: 'Weak' },
      { w: '50%', color: '#facc15', label: 'Fair' },
      { w: '65%', color: '#a3e635', label: 'Good' },
      { w: '80%', color: '#4ade80', label: 'Strong' },
      { w: '100%', color: '#22c55e', label: 'Excellent' },
    ];

    const lvl = levels[Math.min(score, 5)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.color;
    lbl.style.color = lvl.color;
    lbl.textContent = lvl.label;
    
    if (currentMode === 'text') handleInput();
    else updateFileButton();
  }

  $('secretKey').addEventListener('input', updateStrength);
</script>
</body>
